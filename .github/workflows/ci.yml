name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # Lightweight deps only — the offline test suite doesn't need the heavy
          # ML stack (docling, sentence-transformers, chromadb). langchain-core is
          # pure-python and needed by the eval-harness tests.
          pip install pydantic pandas numpy rank-bm25 python-dotenv pytest flake8 \
                      langchain-core

      - name: Lint
        run: flake8 src/ tests/ scripts/ eval/

      - name: Run tests
        run: python -m pytest tests/ -v
